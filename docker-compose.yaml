services:
  backend:
    build: ./backend
    ports:
      - "5500:5500"
    environment:
      - LLM_URL=http://llm:11434/api/generate
    depends_on:
      - llm

  llm:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  